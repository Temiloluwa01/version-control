name: Application Deployment Pipeline

on:
  workflow_run:
    workflows: ["Terraform Infrastructure Pipeline"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

jobs:
  verify-infrastructure:
    name: Verify if the Infrastructure is Ready
    runs-on: ubuntu-latest
    steps:
      - name: Check Infrastructure Pipeline Status
        run: |
          if [ "${{ github.event.workflow_run.conclusion }}" != "success" ]; then
            echo "Infrastructure pipeline did not succeed. Aborting deployment."
            exit 1
          fi
          echo "Infrastructure pipeline succeeded. Proceeding with deployment."

  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: verify-infrastructure
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Image Tag
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "tag=$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          

      - name: Build Backend Docker Image
        run: |
          docker build \
            --compress \
            -t ${{ secrets.DOCKER_USERNAME }}/backend:${{ steps.meta.outputs.tag }} \
            -t ${{ secrets.DOCKER_USERNAME }}/backend:latest \
            ./backend

      - name: Push Backend Docker Image
        run: |
          echo "Pushing backend:${{ steps.meta.outputs.tag }}"
          docker push ${{ secrets.DOCKER_USERNAME }}/backend:${{ steps.meta.outputs.tag }} || docker push ${{ secrets.DOCKER_USERNAME }}/backend:${{ steps.meta.outputs.tag }}
          echo "Pushing backend:latest"
          docker push ${{ secrets.DOCKER_USERNAME }}/backend:latest || docker push ${{ secrets.DOCKER_USERNAME }}/backend:latest

      - name: Build Frontend Docker Image
        run: |
          docker build \
            --compress \
            -t ${{ secrets.DOCKER_USERNAME }}/frontend:${{ steps.meta.outputs.tag }} \
            -t ${{ secrets.DOCKER_USERNAME }}/frontend:latest \
            ./frontend

      - name: Push Frontend Docker Image
        run: |
          echo "Pushing frontend:${{ steps.meta.outputs.tag }}"
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend:${{ steps.meta.outputs.tag }} || docker push ${{ secrets.DOCKER_USERNAME }}/frontend:${{ steps.meta.outputs.tag }}
          echo "Pushing frontend:latest"
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend:latest || docker push ${{ secrets.DOCKER_USERNAME }}/frontend:latest

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Validate Required Secrets
        run: |
          [ -z "${{ secrets.EC2_HOST }}" ] && echo "EC2_HOST secret missing" && exit 1
          [ -z "${{ secrets.EC2_USER }}" ] && echo "EC2_USER secret missing" && exit 1
          [ -z "${{ secrets.EC2_SSH_KEY }}" ] && echo "EC2_SSH_KEY secret missing" && exit 1
          [ -z "${{ secrets.DOCKER_USERNAME }}" ] && echo "DOCKER_USERNAME secret missing" && exit 1
          [ -z "${{ secrets.DOCKER_PASSWORD }}" ] && echo "DOCKER_PASSWORD secret missing" && exit 1
          echo "All required secrets are configured"

      - name: Debug deployment file presence
        run: |
          echo "Workspace: $GITHUB_WORKSPACE"
          ls -la "$GITHUB_WORKSPACE"
          ls -la "$GITHUB_WORKSPACE/docker-compose.yml"

      - name: Copy deployment compose to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "./docker-compose.yml"
          target: "/home/${{ secrets.EC2_USER }}/app"

      - name: Create remote environment file
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p /home/${{ secrets.EC2_USER }}/app
            cat > /home/${{ secrets.EC2_USER }}/app/.env <<'EOF'
            DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            DOCKER_PASSWORD=${{ secrets.DOCKER_PASSWORD }}
            EOF

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /home/${{ secrets.EC2_USER }}/app

            # Install Docker if not installed
            if ! command -v docker >/dev/null 2>&1; then
              echo "Docker not found. Installing Docker..."

              sudo apt-get update -y
              sudo apt-get install -y ca-certificates curl gnupg

              sudo install -m 0755 -d /etc/apt/keyrings

              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | \
               sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg

              sudo chmod a+r /etc/apt/keyrings/docker.gpg

              echo \
               "deb [arch=$(dpkg --print-architecture) \
                signed-by=/etc/apt/keyrings/docker.gpg] \
                https://download.docker.com/linux/ubuntu \
                $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | \
                sudo tee /etc/apt/sources.list.d/docker.list > /dev/null

              sudo apt-get update -y

              sudo apt-get install -y \
                docker-ce \
                docker-ce-cli \
                containerd.io \
                docker-buildx-plugin \
                docker-compose-plugin

              sudo systemctl enable docker
              sudo systemctl start docker

            fi
   
            echo "Docker Version:"
            sudo docker --version

            echo "Docker Compose Version:"
            sudo docker compose version

            echo "Logging into DockerHub..."
            echo "${{ secrets.DOCKER_PASSWORD }}" | \
              sudo docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            echo "Pulling latest images..."
            sudo docker compose pull

            echo "Stopping old containers..."
            sudo docker compose down || true

            echo "Starting new containers..."
            sudo docker compose up -d

            echo "Deployment completed successfully!"
              
      
      - name: Health Check
        run: |
          echo "Verifying application is running..."
          for i in {1..5}; do
            if curl -f http://${{ secrets.EC2_HOST }}:80 > /dev/null 2>&1; then
              echo "Frontend is healthy"
              exit 0
            fi
            echo "Retry $i/5 - waiting for app to be ready..."
            sleep 5
          done
          echo "Health check failed"
          exit 1

      - name: Notify Success
        if: success()
        run: echo "Deployment completed successfully!"