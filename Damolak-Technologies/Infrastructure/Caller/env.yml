Elastic_compute_cloud:
  ec2:
    - name: dev-ec2
      ami: ami-0fc5d935ebf8bc3bc
      instance_type: t2.micro
      tags:
        Environment: dev
        Project: task-manager


Virtual_private_cloud:
  vpc:
    - name: dev-vpc
      cidr_block: 10.0.0.0/16
      enable_dns_support: true
      enable_dns_hostnames: true

      tags:
        Environment: dev
        Project: task-manager

Subnets:
  subnet:
    - name: public-subnet-1
      cidr_block: 10.0.1.0/24
      availability_zone: us-east-1a
      public: true

      tags:
        Environment: dev


Security_groups:
  security_group:
    - name: dev-sg
      description: Security group for dev environment

      ingress_rules:
        - protocol: tcp
          from_port: 22
          to_port: 22
          cidr_blocks:
            - 0.0.0.0/0  # For GitHub Actions deployment - consider restricting to GitHub's IP ranges
        - protocol: tcp
          from_port: 80
          to_port: 80
          cidr_blocks:
            - 0.0.0.0/0  # HTTP for web app
        - protocol: tcp
          from_port: 443
          to_port: 443
          cidr_blocks:
            - 0.0.0.0/0  # HTTPS for web app
        - protocol: tcp
          from_port: 3000
          to_port: 3000
          cidr_blocks:
            - 0.0.0.0/0  # React frontend (typical MERN port)
        - protocol: tcp
          from_port: 5000
          to_port: 5000
          cidr_blocks:
            - 0.0.0.0/0  # Node.js backend (typical MERN port)

      egress_rules:
        - protocol: "-1"
          from_port: 0
          to_port: 0
          cidr_blocks:
            - 0.0.0.0/0

      tags:
        Environment: dev
        Project: task-manager